<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Bee's Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="contact-page">

  <div class="bee bee1">🐝</div>
  <div class="bee bee2">🐝</div>
  <div class="bee bee3">🐝</div>
  <div class="bee bee4">🐝</div>
  <div class="bee bee5">🐝</div>
  <div class="bee bee6">🐝</div>

  <header>
    <h1>Contact</h1>
    <p>Bee Creative 🐝</p>
  </header>

  <main class="contact-wrapper">
    <div class="contact-card">
      <form
        class="contact-form"
        action=""
        method="POST"
      >
        <label for="name">Name *</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Your Name..."
          required
        >

        <label for="email">Email Address *</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Your Email Address..."
          required
        >

        <label for="message">Message *</label>
        <textarea
          id="message"
          name="message"
          placeholder="Your Message..."
          required
        ></textarea>

        <input type="hidden" name="_subject" value="New interest from Bee's Portfolio">

        <div class="contact-actions">
          <button type="submit">Submit</button>
          <a href="index.html" class="back-btn">Back</a>
        </div>
      </form>
    </div>
  </main>

</body>
</html>
